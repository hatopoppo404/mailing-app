<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mailing-app</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js" defer></script>

    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

    <script src="script.js" defer></script>
</head>

<body class="gradation-bg">
    <header>
        <div class="header-background glass-effect">
            <img class="logo" src="img/logo.svg" alt="">
        </div>
    </header>

    <main>
        <section class="editor-section glass-effect">
            <div class="subject-and-save">
                <input type="text" class="subject-input" id="subject-input"
                    placeholder="件名を入力してください（例：{{company}}様へのお知らせ）">
            </div>
            <div class="editor-wrapper">
                <div id="editor">
                    <p>ここにメール本文を書いてください。</p>
                    <p>宛先ごとに変えたい部分は <strong>{{名前}}</strong> のように設定できます。</p>
                </div>
            </div>
        </section>

        <aside class="sidebar custom-scrollbar">
            <div class="sidebar-section glass-effect custom-scrollbar">
                <div class="custom-select" id="template-select">
                    <h3 class="mail-template-label">メールテンプレート</h3>
                    <div class="select-trigger">
                        <span id="selected-text">テンプレートを選択</span>
                        <div class="arrow" aria-hidden="true">
                            <svg viewBox="0 0 22 14" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M1.50012 1.50006L9.43203 11.5193C10.2328 12.5308 11.7675 12.5308 12.5682 11.5193L20.5001 1.50006" />
                            </svg>
                        </div>
                        <ul class="select-options" id="select-options">
                            <li class="option" data-value="1">テンプレートA</li>
                            <li class="option" data-value="2">テンプレートB</li>
                            <li class="option" data-value="3">テンプレートC</li>
                        </ul>
                    </div>
                </div>

                <div class="address-list">
                    <div id="table-container" class="custom-scrollbar">
                        <table>
                            <thead>
                                <th class="selected-label">宛先</th>
                                <th class="selected-remove-icon"><span id="selected-count">0</span>件</th>
                            </thead>
                            <tbody id="selected-table-body">
                                <tr>
                                    <td colspan="2" class="unselected">下のボタンで宛先を追加してください</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="address-add-sec">
                        <button class="btn__address-add" id="add-address-btn" aria-label="宛先追加">
                            <span class="icon-add-address" aria-hidden="true">
                                <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="14" cy="14" r="12.5" />
                                    <line x1="14.5" y1="8.5" x2="14.5" y2="20.5" />
                                    <line x1="8.5" y1="14.5" x2="20.5" y2="14.5" />
                                </svg>
                            </span>
                        </button>
                        <ul class="address-options custom-scrollbar" id="address-options">
                            <li class="option-item">
                                <label>
                                    <input type="checkbox" class="item-checkbox" value="template1" id="item1">
                                    <span>テンプレートA</span>
                                </label>
                            </li>
                        </ul>
                    </div>
                </div>

                <button class="variable-customize"><span>変数をカスタマイズ</span><span class="icon--arrow__right"><span
                            class="icon-next" aria-hidden="true">
                            <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 21L18.9702 15.5787C19.9997 14.778 19.9997 13.222 18.9702 12.4213L12 7" />
                                <circle cx="14" cy="14" r="12.5" />
                            </svg>
                        </span></span></button>

            </div>
            <div class="float-sec">
                <button class="btn__save">
                    <i class="icon-download" aria-hidden="true">
                        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M38 26V34C38 35.0609 37.5786 36.0783 36.8284 36.8284C36.0783 37.5786 35.0609 38 34 38H6C4.93913 38 3.92172 37.5786 3.17157 36.8284C2.42143 36.0783 2 35.0609 2 34V26M10 16L20 26M20 26L30 16M20 26V2" />
                        </svg>
                    </i>
                    <span>メールを作成する</span>
                </button>
                <div class="directory-edit glass-effect">
                    <button id="btn__directory-edit" class="btn__directory-edit glass-effect">
                        <i class="icon-user" aria-hidden="true">
                            <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
                                <path transform="translate(2.5 2.5)"
                                    d="M8 9.5C9.06026 9.5 10.104 9.62415 11.1318 9.87305C12.1576 10.1215 13.1708 10.4942 14.1699 10.9932V10.9941C14.5704 11.2013 14.8915 11.5 15.1367 11.8994C15.3791 12.2942 15.5 12.7244 15.5 13.2002V15.5H0.5V13.2002C0.5 12.7244 0.620925 12.2942 0.863281 11.8994C1.10852 11.5 1.4287 11.2003 1.8291 10.9932C2.82852 10.494 3.84208 10.1216 4.86816 9.87305C5.89603 9.62415 6.93974 9.5 8 9.5ZM8 0.5C8.96634 0.5 9.78137 0.838007 10.4717 1.52832C11.162 2.21863 11.5 3.03366 11.5 4C11.5 4.96634 11.162 5.78137 10.4717 6.47168C9.78137 7.16199 8.96634 7.5 8 7.5C7.03366 7.5 6.21863 7.16199 5.52832 6.47168C4.83801 5.78137 4.5 4.96634 4.5 4C4.5 3.03366 4.83801 2.21863 5.52832 1.52832C6.21863 0.838007 7.03366 0.5 8 0.5Z" />
                            </svg>
                        </i>
                        <span>宛先リストを編集</span>
                    </button>
                    <button id="btn__save-template" class="btn__save-template glass-effect">
                        <i class="icon-save" aria-hidden="true">
                            <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M15.25 19.25V11.25H5.25V19.25M5.25 1.25V6.25H13.25M17.25 19.25H3.25C2.71957 19.25 2.21086 19.0393 1.83579 18.6642C1.46071 18.2891 1.25 17.7804 1.25 17.25V3.25C1.25 2.71957 1.46071 2.21086 1.83579 1.83579C2.21086 1.46071 2.71957 1.25 3.25 1.25H14.25L19.25 6.25V17.25C19.25 17.7804 19.0393 18.2891 18.6642 18.6642C18.2891 19.0393 17.7804 19.25 17.25 19.25Z" />
                            </svg>
                        </i>
                        <span>テンプレート保存</span>
                    </button>
                </div>
            </div>
        </aside>

    </main>

    <footer>
        <small>© 2026 Mailing App. All rights reserved.</small>
    </footer>
    <div class="address-list-edit-sec modal-overlay" id="address-list-edit-Container">
        <div class="modal-content" id="address-list-edit-window">
            <h2 class="edit-title">宛先リスト編集</h2>
            <div class="table-container">
                <table id="table__address-lists">
                    <thead>
                        <th class="setName sticky-left">セット名</th>
                        <th class="co">所属</th>
                        <th class="addressee">名前</th>
                        <th class="to">To</th>
                        <th class="cc">Cc</th>
                        <th class="bcc">Bcc</th>
                        <th class="remove sticky-right"></th>
                    </thead>
                    <tbody id="body__address-lists">

                    </tbody>
                </table>
            </div>
            <button id="edit-add" class="btn__address-list">
                <span class="icon-add-address" aria-hidden="true">
                    <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="14" cy="14" r="12.5" />
                        <line x1="14.5" y1="8.5" x2="14.5" y2="20.5" />
                        <line x1="8.5" y1="14.5" x2="20.5" y2="14.5" />
                    </svg>
                </span>
            </button>
            <div class="edit-close">
                <button id="edit-ok" class="btn__address-list">OK</button>
                <button id="edit-cancel" class="btn__address-list">cancel</button>
            </div>
        </div>
    </div>
    <div id="customAlert" class="modal-overlay">
        <div class="modal-content">
            <h2 id="alertTitle">確認</h2>
            <p id="alertMessage">メッセージ</p>
            <button id="alertClose">OK</button>
        </div>
    </div>
    <div id="customConfirm" class="modal-overlay">
        <div class="modal-content" id="confirmWindow">
            <h2 id="confirmTitle">確認</h2>
            <p id="confirmMessage">メッセージ</p>
            <div class="confirmBtn">
                <button id="confirmOk">OK</button>
                <button id="confirmCancel">Cancel</button>
            </div>
        </div>
    </div>
</body>

</html>
