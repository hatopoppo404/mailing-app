<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mailing-app</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js" defer></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="script.js" defer></script>
</head>

<body class="gradation-bg">
    <header>
        <div class="header-background glass-effect">
            <img class="logo" src="logo.svg" alt="">
        </div>
    </header>

    <main>
        <section class="editor-section glass-effect">
            <div class="subject-and-save">
                <input type="text" class="subject-input" placeholder="件名を入力してください（例：{{company}}様へのお知らせ）">
            </div>
            <div class="editor-wrapper">
                <div id="editor">
                    <p>ここにメール本文を書いてください。</p>
                    <p>宛先ごとに変えたい部分は <strong>{{名前}}</strong> のように設定できます。</p>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="sidebar-section glass-effect">
                <div class="custom-select" id="template-select">
                    <h3 class="mail-template-label">メールテンプレート</h3>
                    <div class="select-trigger">
                        <span id="selected-text">テンプレートを選択</span>
                        <div class="arrow">
                            <svg width="22" height="14" viewBox="0 0 22 14" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M1.50012 1.50006L9.43203 11.5193C10.2328 12.5308 11.7675 12.5308 12.5682 11.5193L20.5001 1.50006" />
                            </svg>
                        </div>
                        <ul class="select-options" id="select-options">
                            <li class="option" data-value="1">テンプレートA</li>
                            <li class="option" data-value="2">テンプレートB</li>
                            <li class="option" data-value="3">テンプレートC</li>
                        </ul>
                    </div>
                </div>

                <div class="address-list">
                    <div id="table-container">
                        <table>
                            <thead>
                                <th class="selected-label">宛先</th>
                                <th class="selected-remove-icon"><span id="selected-count">0</span>件</th>
                            </thead>
                            <tbody id="selected-table-body">
                                <tr>
                                    <td colspan="2" class="unselected">下のボタンで宛先を追加してください</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="address-add-sec">
                        <button class="btn__address-add" id="add-address-btn" aria-label="宛先追加">
                            <svg width="28" height="28" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="14" cy="14" r="12.5" />
                                <line x1="14.5" y1="8.5" x2="14.5" y2="20.5" stroke-linecap="round" />
                                <line x1="8.5" y1="14.5" x2="20.5" y2="14.5" stroke-linecap="round" />
                            </svg>
                        </button>
                        <ul class="address-options" id="address-options">
                            <li class="option-item">
                                <label>
                                    <input type="checkbox" class="item-checkbox" value="item1" id="item1">
                                    <span>テンプレートA</span>
                                </label>
                            </li>
                            <li class="option-item">
                                <label>
                                    <input type="checkbox" class="item-checkbox" value="item2" id="item2">
                                    <span>テンプレートB</span>
                                </label>
                            </li>
                            <li class="option-item">
                                <label>
                                    <input type="checkbox" class="item-checkbox" value="item2" id="item3">
                                    <span>テンプレートC</span>
                                </label>
                            </li>
                            <li class="option-item">
                                <label>
                                    <input type="checkbox" class="item-checkbox" value="item2" id="item4">
                                    <span>テンプレートD</span>
                                </label>
                            </li>
                            <li class="option-item">
                                <label>
                                    <input type="checkbox" class="item-checkbox" value="item2" id="item5">
                                    <span>テンプレートE</span>
                                </label>
                            </li>
                        </ul>
                    </div>
                </div>

                <button class="variable-customize"><span>変数をカスタマイズ</span><span class="icon--arrow__right"><svg
                            class="icon-next" viewBox="0 0 28 28">
                            <path d="M12 21L18.9702 15.5787C19.9997 14.778 19.9997 13.222 18.9702 12.4213L12 7" />
                            <circle cx="14" cy="14" r="12.5" />
                        </svg></span></button>

            </div>
            <div class="float-sec">
                <button class="btn__save">
                    <svg class="icon-download" viewBox="0 0 40 40">
                        <path
                            d="M38 26V34C38 35.0609 37.5786 36.0783 36.8284 36.8284C36.0783 37.5786 35.0609 38 34 38H6C4.93913 38 3.92172 37.5786 3.17157 36.8284C2.42143 36.0783 2 35.0609 2 34V26M10 16L20 26M20 26L30 16M20 26V2" />
                    </svg>
                    メールを作成する
                </button>
                <div class="directory-edit glass-effect">
                    <button class="btn__directory-edit glass-effect">宛先リストを編集</button>
                    <button class="btn__save-template glass-effect">
                        <i class="icon-save"></i>
                        <span>テンプレートとして保存</span>
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <footer>
        <small>© 2023 Mailing App. All rights reserved.</small>
    </footer>
</body>

</html>
